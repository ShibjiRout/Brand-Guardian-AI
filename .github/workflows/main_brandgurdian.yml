# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - brandgurdian

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: ytcompqa.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_5318DE13C57743529254B2FB0A85D736 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_2D280A6184E8437C90FAD353F49E2DC9 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: ytcompqa.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_5318DE13C57743529254B2FB0A85D736 }}/brand-guardian-api:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FB03C42D74C94D30A9C5CCADD7CB6839 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2E7D293F0E39430CA64CC3E4FBE036FB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_218DC67B9CE9433096D43AC1183B799F }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'brandgurdian'
          slot-name: 'Production'
          images: 'ytcompqa.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_5318DE13C57743529254B2FB0A85D736 }}/brand-guardian-api:${{ github.sha }}'
          